<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: #e9f7ef; }
    .login-container {
      max-width: 350px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px 24px;
      border-top: 8px solid #0d6efd; /* Azul del logo */
    }
    h2 { color: #0d6efd; font-weight: bold; text-align: center; margin-bottom: 24px; }
    label { font-weight: 500; margin-top: 12px; }
    input, select {
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #0d6efd;
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }
    input[type="submit"], button {
      background: #0d6efd;
      color: #fff;
      border: none;
      font-weight: bold;
      border-radius: 6px;
      padding: 10px 0;
      cursor: pointer;
      transition: background 0.2s;
    }
    input[type="submit"]:hover, button:hover {
      background: #145c32;
    }
    @media (max-width: 500px) {
      .login-container { padding: 18px 8px; }
      h2 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form action="login.php" method="post" id="formulario">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" required>
      <label for="passw">Contraseña</label>
      <input type="password" id="passw" name="passw" required>
      <label for="area">Departamento:</label>
      <select name="area" id="area" required>
        <option value="Produccion">Producción</option>
        <option value="">Selecciona un área</option>
        <!-- <option value="Operaciones">Operaciones</option> -->
        <option value="Almacen de Materia Prima">Almacen de Materia Prima</option>
        <option value="Embarques">Embarques</option>
        <option value="Calidad Administracion">Calidad Administración</option>
        <option value="Moldes">Moldes</option>
        <option value="Mantenimiento">Mantenimiento</option>
        <option value="Operaciones">Operaciones</option>
        <option value="Direccion General">Dirección General</option>
        <option value="Contraloria">Contraloría</option>
        <option value="Ingenieria">Ingeniería</option>
        <option value="Calidad Operaciones">Calidad Operaciones</option>
        <option value="Recursos Humanos">Recursos Humanos</option>
        <option value="Materiales">Materiales</option>
        <option value="Ventas">Ventas</option>
        <option value="Sistemas">Sistemas</option>
      </select>
      <div id="registro-extra" style="display: none;">
        <label for="no_empl">No. Empleado</label>
        <input type="number" id="no_empl" name="no_empl" placeholder="No. Empleado">
      </div>
      <div class="button-group">
        <input type="submit" value="Entrar" name="Entrar">
        <button type="button" id="btnRegistrar">Registrar</button>
      </div>
    </form>
  </div>
  <script>
    let mostrarCampos = false;
    document.getElementById("btnRegistrar").addEventListener("click", function () {
      const extra = document.getElementById("registro-extra");
      if (!mostrarCampos) {
        extra.style.display = "block";
        mostrarCampos = true;
        this.textContent = "Enviar Registro";
      } else {
        const inputHidden = document.createElement("input");
        inputHidden.type = "hidden";
        inputHidden.name = "Registrar";
        inputHidden.value = "1";
        document.getElementById("formulario").appendChild(inputHidden);
        document.getElementById("formulario").submit();
      }
    });element.addEventListener("touchstart", () => {
  console.log("Toque detectado");
});
  </script>

</body>
</html>
