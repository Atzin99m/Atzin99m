<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asignación y Seguimiento de órdenes</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .formulario { max-width: 700px; margin: auto; }
        /* Tus estilos CSS aquí */
    </style>
</head>
<body class="bg-light">
    <div class="formulario">
        <div class="container py-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center d-flex align-items-center" style="background: #0d6efd; min-height: 70px;">
                    <img src="http://localhost/Proyecto_Orden%20MNTTO/img/Imagen1.jpg" alt="Logo" style="height: 50px; width: auto; background: transparent; margin-right: 16px;">
                    <span class="flex-grow-1" style="font-size: 1.3rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;">
                        Asignación y Seguimiento de órdenes de Trabajo de Mantenimiento
                    </span>
                </div>
                <div class="card-body">
                    <form id="tecnicoForm" method="post">
                        <div class="row">
                            <input type="hidden" name="id" id="id" value="0">
                            <div class="col-12 col-md-4 mb-3">
                                <label class="form-label">No Orden: <input type="number" name="no_orden" id="no_orden" class="form-control"></label>
                            </div>
                             <div class="col-12 col-md-4 mb-3">
                                <textarea name="descripcion" id="descripcion" class="form-control"></textarea>
                            </div>
                            <div class="col-12 col-md-4 mb-3">
                                <label class="form-label">No Empleado: <input type="number" name="no_empl" id="no_empl" class="form-control"></label>
                            </div>
                            <div class="col-12 col-md-4 mb-3">
                                <label class="form-label">Nombre: <input type="text" name="Nombre" id="Nombre" class="form-control"></label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label">Turno: <input type="text" name="turno" id="turno" class="form-control"></label>
                            </div>
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label">Tipo: <input type="text" name="Tipo" id="Tipo" class="form-control"></label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label">Recepción: <input type="datetime-local" name="Recepcion" id="Recepcion" class="form-control"></label>
                            </div>
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label">Recep Máquina: <input type="datetime-local" name="recep_maquina" id="recep_maquina" class="form-control"></label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label">Hora Inicio: <input type="time" name="Hr_ini" id="Hr_ini" class="form-control"></label>
                            </div>
                            <div class="col-12 col-md-6 mb-3">
                                <label class="form-label">Hora Fin: <input type="time" name="Hr-Fin" id="Hr-Fin" class="form-control"></label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12 col-md-4 mb-3">
                                <label class="form-label">Tiempo Área: <input type="time" name="time_area" id="time_area" class="form-control"></label>
                            </div>
                            <div class="col-12 col-md-4 mb-3">
                                <label class="form-label">Tiempo Extra: <input type="time" name="t_extra" id="t_extra" class="form-control"></label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Trabajo Realizado: <textarea name="t_realizado" id="t_realizado" class="form-control"></textarea></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Observaciones: <textarea name="observaciones" id="observaciones" class="form-control"></textarea></label>
                        <div class="mb-3">
                            <label class="form-label">Estatus:
                                <select name="Estatus" id="Estatus" class="form-select">
                                    <option value="en proceso">En proceso</option>
                                    <option value="terminado">Terminado</option>
                                    <option value="pendiente">Pendiente</option>
                                            <option value="cancelado">Cancelado</option>
                                </select>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar</button>
                    </form>
                    <hr>
                    <h3>Registros:</h3>
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered">
                            <thead class="table-dark">
                                <tr>
            <th>ID</th>
            <th>No. Empleado</th>
            <th>Nombre</th>
            <th>Turno</th>
            <th>No. Orden</th>
            <th>Recepcion</th>
            <th>Recep. Máquina</th>
            <th>Tipo</th>
            <th>Hora Ini</th>
            <th>Hora Fin</th>
            <th>Time Área</th>
            <th>Tiempo Extra</th>
            <th>Total Horas</th>
            <th>Trabajo Realizado</th>
            <th>Observaciones</th>
            <th>Estatus</th>
        </tr>
                            </thead>
                            <tbody><script src="tecnicos.js"></script></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="ordenes.js"></script>
</body>
</html>
