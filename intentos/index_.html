                                ]
                            };
                            const nave = document.getElementById("nave ");
                            const maquinaSelect = document.getElementById("maquina ");
                            nave.addEventListener("change ", () => {
                                maquinaSelect.innerHTML = '<option value=" ">-- Selecciona una máquina --</option>';
                                if (nave.value) {
                                    maquinaSelect.disabled = false;
                                    maquinasPorNave[nave.value].forEach(num => {
                                        const option = document.createElement("option ");
                                        option.value = num;
                                        option.textContent = num;
                                        maquinaSelect.appendChild(option);
                                    });
                                } else {
                                    maquinaSelect.disabled = true;
                                }
                            });
                        </script>

                        <!-- Nivel 1 -->
                        <div class="mb-3 ">

                            <select id="nivel1 " class="form-select ">
              <option value=" ">-- Selecciona una opción --</option>
              <option value="Servicios ">Servicios Generales</option>
              <option value="Maquinas ">Máquina</option>
              <option value="Equipos Perifericos ">Equipos Periféricos</option>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js "></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js "></script>

    <script>
        const opciones = {
            "Servicios ": {
                "Agua ": ["Fuga de Agua "],
                "Aire ": [],
                "Electricidad ": []
            },
            "Maquinas ": {
                "Fugas de Aceite ": ["Clamp ", "Core ", "Valve Gate ", "Pistones "],
                "Unidad de Inyección ": [],
                "Unidad de Cierre ": []
            },
            "Equipos Perifericos ": {
                "Termoregulador ": ["Habilitar Termoregulador ", "No levanta temperatura ", "Fuga de Agua ", "Variación de Temperatura "],
                "Robot ": ["Eje X ", "Eje Y ", "Eje Z ", "Sistema Neumático ", "Alarma de Robot "],
                "Controlador de Temperatura ": ["Habilitar Controlador ", "Variación en Zona "],
                "Tolva Secadora ": [],
                "Cargador ": ["No carga Material "]
            },
            "Dispositivo ": {
                "Habilitar Dispositivo ": [],
                "Sistema Eléctrico ": [],
                "Sistema Neumático ": []
            }
        };

        $(document).ready(() => {
            $('#nivel1').select2({
                placeholder: "Selecciona una opción ",
                width: '100%'
            });

            $('#nivel1').on('change', function() {
                const categoria = $(this).val();
                $('#nivel2').html('');
                $('#nivel3').html('');
                if (!categoria) return;

                let html = `<label class="form-label ">Subcategoría:</label>
    <select id="subcat " class="form-select ">
      <option value=" ">-- Selecciona subcategoría --</option>`;

                for (let subcat in opciones[categoria]) {
                    html += `<option value="${subcat} ">${subcat}</option>`;
                }
                html += "</select>";
                $('#nivel2').html(html);
                $('#subcat').select2({
                    placeholder: "Selecciona subcategoría",
                    width: '100%'
                });
                $('#subcat').on('change', function() {
                    const subcat = $(this).val();
                    $('#nivel3').html('');
                    const detalles = opciones[categoria][subcat];
                    if (!detalles || detalles.length === 0) return;
                    let detHtml = `<label class="form-label">Detalle:</label>
                    <select id="detalle" class="form-select">
        <option value="">-- Selecciona detalle --</option>`;
                    detalles.forEach(d => detHtml += `<option value="${d}">${d}</option>`);
                    detHtml += "</select>";
                    $('#nivel3').html(detHtml);
                    $('#detalle').select2({
                        placeholder: "Selecciona detalle",
                        width: '100%'
                    });
                    /*if (["Fugas de Aceite", "Robot", "Termoregulador", "Cargador"].includes(subcat))
                                       { $('#nivel3').append(` `); }*/
                });
            });
        });
    </script>
