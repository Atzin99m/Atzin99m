<!DOCTYPE html>
<html>
<head> 
  <link rel="stylesheet" href="style.css">  
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Autorizar Órdenes - Jefe de Área</title>
  <style>
    input.autoriza-input {
      width: 100%;
      padding: 4px;
      font-size: 14px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    td, th {
      padding: 6px;
      border: 1px solid #999;
    }
  </style>
</head>
<body class="bg-light">

  <table>
    <thead>
      <tr>
        <th>#Orden</th>
        <th>Solicitante</th>
        <th>Departamento</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th>Autorizar (tu nombre o número)</th>
      </tr>
    </thead>
    <tbody>
        <tr>
      <td>
    <form action="autoritation.php" method="post">
      <input type="text" name="autorizacion" placeholder="Número de empleado" required>
      <button type="submit">Autorizar</button>
    </form>
</td>

        </tr>
     
    </tbody>
  </table>

  <script>
    document.querySelectorAll('.autoriza-input').forEach(input => {
      input.addEventListener("blur", enviarAutorizacion);
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          this.blur();
        }
      });
    });

    function enviarAutorizacion(e) {
      const ordenId = e.target.dataset.id;
      const autorizacion = e.target.value;

      fetch("autoritation.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          orden_id: ordenId,
          autorizacion: autorizacion
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          e.target.disabled = true;
          e.target.style.backgroundColor = "#e0ffe0";
        } else {
          alert("Error al guardar autorización.");
        }
      });
    }
  </script>
</body>
</html>
